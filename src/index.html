<!-- src/index.html -->
<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khamsat Monitor | Live Dashboard</title>
    <link rel="stylesheet" href="index.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="dashboard-container">
        <header class="main-header">
            <div class="header-left">
                <h1><span class="pulsing-dot" style="background-color: var(--primary);"></span> Khamsat Monitor</h1>
            </div>

            <div class="stats-compact-bar">
                <div class="stat-mini" data-tooltip="إجمالي المعرفات (Total IDs)">
                    <i class="fa-solid fa-fingerprint"></i>
                    <span id="stat-known-ids">0</span>
                </div>
                <div class="stat-mini" data-tooltip="الطلبات المحفوظة (Cached Posts)">
                    <i class="fa-solid fa-database"></i>
                    <span id="stat-all-posts">0</span>
                </div>
                <div class="stat-mini" data-tooltip="دورات الفحص (Poll Cycles)">
                    <i class="fa-solid fa-bolt"></i>
                    <span id="stat-poll-count">0</span>
                </div>
                <div class="stat-mini" data-tooltip="آخر نشاط (Last Poll)">
                    <i class="fa-solid fa-clock"></i>
                    <span id="stat-last-poll" dir="ltr">--</span>
                </div>
                <div class="divider-subtle"></div>
                <div class="pagination-controls">
                    <button id="prev-page" class="page-btn" title="الصفحة السابقة">
                        <i class="fa-solid fa-chevron-up"></i>
                    </button>
                    <div class="page-info">
                        <span id="current-page">1</span>
                        <span class="page-separator">/</span>
                        <span id="total-pages">1</span>
                    </div>
                    <button id="next-page" class="page-btn" title="الصفحة التالية">
                        <i class="fa-solid fa-chevron-down"></i>
                    </button>
                </div>
            </div>

            <div class="header-right">
                <div id="connection-status" class="status-badge">
                    <span class="pulsing-dot"></span>
                    <span id="status-text">Connected</span>
                </div>
                <!-- Khamsat Token Setting -->
                <div class="token-setting glass-effect">
                    <div class="token-header">
                        <i class="fa-solid fa-key"></i> Khamsat Token
                    </div>
                    <input type="password" id="khamsat-token" placeholder="أدخل التوكين هنا..." value="">
                    <p class="token-note">التوكين يحفظ محلياً فقط في المتصفح.</p>
                </div>
            </div>
        </header>

        <main>
            <!-- RECENT HISTORY (Full Width) -->
            <section class="scroll-area fancy-scrollbar">
                <div id="recent-feed">
                    <div class="placeholder-msg">جاري تحميل الطلبات...</div>
                </div>
            </section>
        </main>
    </div>

    <!-- Post Details Modal -->
    <div id="post-modal" class="modal-overlay">
        <div class="modal-container glass-effect">
            <div class="modal-header">
                <h3 id="modal-title" class="modal-title"></h3>
                <button id="modal-close" class="modal-close-btn">
                    <i class="fa-solid fa-times"></i>
                </button>
            </div>
            <div class="modal-meta">
                <span id="modal-buyer" class="buyer-name-tag"><i class="fa-solid fa-user"></i></span>
                <span id="modal-time" class="time-ago tag-subtle"><i class="fa-solid fa-clock"></i></span>
                <span id="modal-id" class="id-tag"></span>
                <a id="modal-link" href="#" target="_blank" class="external-link-btn" title="فتح في خمسات">
                    <i class="fa-solid fa-external-link-alt"></i>
                </a>
            </div>
            <div class="modal-body">
                <p id="modal-content" class="modal-content"></p>
            </div>
        </div>
    </div>

    <!-- Comment Modal -->
    <div id="comment-modal" class="modal-overlay">
        <div class="modal-container glass-effect comment-modal-container">
            <div class="modal-header">
                <h3><i class="fa-solid fa-comment-dots"></i> إضافة تعليق</h3>
                <button id="comment-close" class="modal-close-btn">
                    <i class="fa-solid fa-times"></i>
                </button>
            </div>
            <div class="comment-post-info">
                <h4 id="comment-post-title"></h4>
                <div id="comment-author-info"></div>
            </div>
            <div class="modal-body">
                <textarea id="comment-text" class="comment-textarea" placeholder="اكتب تعليقك هنا..." rows="5"></textarea>
                <div id="comment-status-msg" class="status-msg"></div>
                <div class="modal-actions">
                    <button id="submit-btn" class="submit-btn">
                        <i class="fa-solid fa-paper-plane"></i> إرسال التعليق
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = ''; // Same host
        const PAGE_LIMIT = 7;
        let currentPage = 1;
        let totalPages = 1;
        
        const elements = {
            statusBadge: document.getElementById('connection-status'),
            statusText: document.getElementById('status-text'),
            statKnownIds: document.getElementById('stat-known-ids'),
            statAllPosts: document.getElementById('stat-all-posts'),
            statPollCount: document.getElementById('stat-poll-count'),
            statLastPoll: document.getElementById('stat-last-poll'),
            recentFeed: document.getElementById('recent-feed'),
            currentPageEl: document.getElementById('current-page'),
            totalPagesEl: document.getElementById('total-pages'),
            prevPageBtn: document.getElementById('prev-page'),
            nextPageBtn: document.getElementById('next-page'),
            khamsatToken: document.getElementById('khamsat-token'),
        };

        // Load token from localStorage
        const savedToken = localStorage.getItem('khamsat_token');
        if (savedToken) {
            elements.khamsatToken.value = savedToken;
        }

        elements.khamsatToken.addEventListener('change', (e) => {
            localStorage.setItem('khamsat_token', e.target.value);
        });

        // --- Time Parsing & Formatting ---
        function getRealPostTime(post) {
            // Anchor to the exact moment our script saw it
            const anchorTime = post.detectedAt ? new Date(post.detectedAt) : new Date();

            // Khamsat's GMT timestamp is often timezone-shifted incorrectly (in the future or past).
            // To get perfect sync with Khamsat, we parse their exact Arabic phrase from the HTML text 
            // ("منذ 13 دقيقة", "منذ ساعتين", "أقل من دقيقة") and subtract it from our safe anchor Time.
            let subtractMs = 0;
            const text = post.timing?.posted?.text || '';

            if (text.includes('أقل من دقيقة') || text.includes('ثاني')) {
                subtractMs = 5 * 1000; // ~5 seconds
            } else if (text.includes('دقيقة') || text.includes('دقائق')) {
                const match = text.match(/(\d+)/);
                if (match) subtractMs = parseInt(match[1]) * 60000;
                else subtractMs = text.includes('دقيقتين') ? 2 * 60000 : 0; // For 'دقيقتين'
            } else if (text.includes('ساعة') || text.includes('ساعات')) {
                let mins = 0;
                if (text.includes('ساعتين')) mins = 120;
                else if (text.includes('ساعة و')) mins = 60; // Has fraction
                else {
                    const match = text.match(/(\d+)/);
                    if (match) mins = parseInt(match[1]) * 60;
                }

                // Parse optional trailing minutes
                const minMatch = text.match(/و ?(\d+) دقيقة/);
                if (minMatch) mins += parseInt(minMatch[1]);

                subtractMs = mins * 60000;
            } else if (text.includes('يوم') || text.includes('أيام')) {
                const match = text.match(/(\d+)/);
                if (match) subtractMs = parseInt(match[1]) * 86400000;
                else if (text.includes('يومين')) subtractMs = 2 * 86400000;
                else subtractMs = 86400000;
            }

            // If the text parser completely fails, fallback to the anchor directly.
            return new Date(anchorTime.getTime() - subtractMs);
        }

        function timeAgoArabic(date) {
            const seconds = Math.floor((new Date() - date) / 1000);
            if (seconds < 60) return 'منذ ثواني';
            const minutes = Math.floor(seconds / 60);
            if (minutes === 1) return 'منذ دقيقة';
            if (minutes === 2) return 'منذ دقيقتين';
            if (minutes < 11) return `منذ ${minutes} دقائق`;
            if (minutes < 60) return `منذ ${minutes} دقيقة`;
            const hours = Math.floor(minutes / 60);
            if (hours === 1) return 'منذ ساعة';
            if (hours === 2) return 'منذ ساعتين';
            if (hours < 11) return `منذ ${hours} ساعات`;
            if (hours < 24) return `منذ ${hours} ساعة`;
            const days = Math.floor(hours / 24);
            if (days === 1) return 'منذ يوم';
            if (days === 2) return 'منذ يومين';
            if (days < 11) return `منذ ${days} أيام`;
            return `منذ ${days} يوماً`;
        }

        // Periodically update all timestamps on the page
        setInterval(() => {
            document.querySelectorAll('.time-ago').forEach(el => {
                const ts = el.getAttribute('data-timestamp');
                if (ts) {
                    el.innerText = timeAgoArabic(new Date(ts));
                }
            });
        }, 15000); // refresh every 15s

        function updateStatus(isOnline, err = null) {
            elements.statusBadge.classList.toggle('polling', !isOnline);
            elements.statusText.innerText = isOnline ? 'Live Connection' : (err || 'Reconnecting...');
        }

        function createPostItem(post) {
            const div = document.createElement('div');
            div.className = 'post-item glass-effect';

            // Mouse tracking for glassmorphism hover effect
            div.onmousemove = e => {
                const rect = div.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                div.style.setProperty('--mouse-x', `${x}px`);
                div.style.setProperty('--mouse-y', `${y}px`);
            };

            const dateObj = getRealPostTime(post);

            const avatar = post.requester?.avatar || post.buyer?.avatar || 'https://via.placeholder.com/48';
            const buyerName = post.requester?.name || post.buyer?.name || 'مستخدم غير معروف';
            const title = post.title || 'طلب بدون عنوان';
            const postUrl = post.postUrl && post.postUrl.startsWith('http') ? post.postUrl : `https://khamsat.com${post.postUrl}`;

            const timeAgoText = (dateObj instanceof Date && !isNaN(dateObj)) ? timeAgoArabic(dateObj) : 'غير متوفر';
            const absoluteTime = (dateObj instanceof Date && !isNaN(dateObj))
                ? dateObj.toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit' })
                : '--:--';

            const isoTime = (dateObj instanceof Date && !isNaN(dateObj)) ? dateObj.toISOString() : new Date().toISOString();

            if (post.postDetails) {
                div.classList.add('has-details');
                div.onclick = (e) => {
                    // Don't open modal if user clicks the external link icon
                    if (e.target.closest('.external-link-btn')) return;
                    openModal(post, title, buyerName, timeAgoText, postUrl, isoTime);
                };
            }

            div.innerHTML = `
                <div class="post-item-layout">
                    <img src="${avatar}" class="avatar-lg" alt="${buyerName}" loading="lazy">
                    <div class="post-content">
                        <div class="post-title-row">
                            <span class="post-title">${title}</span>
                        </div>
                        <div class="post-meta-details">
                            <span class="buyer-name-tag"><i class="fa-solid fa-user"></i> ${buyerName}</span>
                            ${post.requester?.level ? `<span class="buyer-level-tag"><i class="fa-solid fa-shield-halved"></i> ${post.requester.level}</span>` : ''}
                            <span class="time-ago tag-subtle" data-timestamp="${isoTime}">
                                <i class="fa-solid fa-clock"></i> ${timeAgoText}
                            </span>
                            <span class="absolute-time text-dim">(${absoluteTime})</span>
                        </div>
                    </div>
                    <div class="post-action">
                        <div class="action-top">
                            <span class="id-tag">#${post.id || post.postId.replace('forum_post-', '')}</span>
                            <div class="post-icon-actions">
                                <button class="comment-icon-btn" onclick="event.stopPropagation(); openCommentModal(${JSON.stringify(post).replace(/"/g, '&quot;')})" title="إضافة تعليق">
                                    <i class="fa-solid fa-comment"></i>
                                </button>
                                <a href="${postUrl}" target="_blank" class="external-link-btn" title="فتح في خمسات">
                                    <i class="fa-solid fa-external-link-alt"></i>
                                </a>
                            </div>
                        </div>
                        ${post.postDetails ? '<i class="fa-solid fa-expand expand-icon"></i>' : ''}
                    </div>
                </div>
            `;
            return div;
        }

        async function fetchStatus() {
            try {
                const res = await fetch(`${API_BASE}/status`);
                const data = await res.json();

                elements.statKnownIds.innerText = data.knownIdsCount.toLocaleString();
                elements.statAllPosts.innerText = data.allPostsCount.toLocaleString();
                elements.statPollCount.innerText = data.pollCount.toLocaleString();

                if (data.lastPollAt) {
                    const time = new Date(data.lastPollAt).toLocaleTimeString();
                    elements.statLastPoll.innerText = time;
                }

                updateStatus(true);
            } catch (err) {
                updateStatus(false, 'Status Offline');
            }
        }

        async function fetchRecent() {
            try {
                const res = await fetch(`${API_BASE}/posts/recent?limit=30`);
                const data = await res.json();

                elements.recentFeed.innerHTML = '';
                if (data.posts.length === 0) {
                    elements.recentFeed.innerHTML = '<div class="placeholder-msg">لا توجد طلبات بعد.</div>';
                    return;
                }

                data.posts.forEach(post => {
                    elements.recentFeed.appendChild(createPostItem(post));
                });
            } catch (err) {
                console.error('Failed to fetch recent', err);
            }
        }

        async function fetchPage(page) {
            try {
                const res = await fetch(`${API_BASE}/posts/all?page=${page}&limit=${PAGE_LIMIT}`);
                const data = await res.json();

                currentPage = data.page;
                totalPages = data.totalPages;

                elements.currentPageEl.innerText = currentPage;
                elements.totalPagesEl.innerText = totalPages;

                // Update button states
                elements.prevPageBtn.disabled = currentPage <= 1;
                elements.nextPageBtn.disabled = currentPage >= totalPages;

                elements.recentFeed.innerHTML = '';
                if (data.posts.length === 0) {
                    elements.recentFeed.innerHTML = '<div class="placeholder-msg">لا توجد طلبات بعد.</div>';
                    return;
                }

                data.posts.forEach(post => {
                    elements.recentFeed.appendChild(createPostItem(post));
                });

                updateStatus(true);
            } catch (err) {
                console.error('Failed to fetch page', err);
                updateStatus(false, 'Fetch Failed');
            }
        }

        // Pagination controls
        elements.prevPageBtn.addEventListener('click', () => {
            if (currentPage > 1) {
                fetchPage(currentPage - 1);
            }
        });

        elements.nextPageBtn.addEventListener('click', () => {
            if (currentPage < totalPages) {
                fetchPage(currentPage + 1);
            }
        });

        // Scroll-based pagination
        const scrollArea = document.querySelector('.scroll-area');
        scrollArea.addEventListener('wheel', (e) => {
            const atTop = scrollArea.scrollTop === 0;
            const atBottom = scrollArea.scrollTop + scrollArea.clientHeight >= scrollArea.scrollHeight - 10;

            if (e.deltaY < 0 && atTop && currentPage > 1) {
                // Scrolling up at top - go to previous page
                e.preventDefault();
                fetchPage(currentPage - 1);
                scrollArea.scrollTop = scrollArea.scrollHeight;
            } else if (e.deltaY > 0 && atBottom && currentPage < totalPages) {
                // Scrolling down at bottom - go to next page
                e.preventDefault();
                fetchPage(currentPage + 1);
                scrollArea.scrollTop = 0;
            }
        }, { passive: false });

        // --- Modal Functions ---
        const modal = document.getElementById('post-modal');
        const modalTitle = document.getElementById('modal-title');
        const modalBuyer = document.getElementById('modal-buyer');
        const modalTime = document.getElementById('modal-time');
        const modalId = document.getElementById('modal-id');
        const modalLink = document.getElementById('modal-link');
        const modalContent = document.getElementById('modal-content');
        const modalClose = document.getElementById('modal-close');

        function openModal(post, title, buyerName, timeAgoText, postUrl, isoTime) {
            modalTitle.innerText = title || 'طلب بدون عنوان';
            modalBuyer.innerHTML = `<i class="fa-solid fa-user"></i> ${buyerName}`;
            modalTime.innerHTML = `<i class="fa-solid fa-clock"></i> ${timeAgoText}`;
            modalId.innerText = `#${post.id || post.postId.replace('forum_post-', '')}`;
            modalLink.href = postUrl;
            modalContent.innerText = post.postDetails || 'لا يوجد تفاصيل';

            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            modal.classList.remove('active');
            document.body.style.overflow = '';
        }

        // --- Comment Functions ---
        const commentModal = document.getElementById('comment-modal');
        const commentPostTitle = document.getElementById('comment-post-title');
        const commentText = document.getElementById('comment-text');
        const submitBtn = document.getElementById('submit-btn');
        const commentStatusMsg = document.getElementById('comment-status-msg');
        let currentPostId = null;

        function openCommentModal(post) {
            currentPostId = post.id;
            commentPostTitle.innerText = post.title || 'بدون عنوان';
            document.getElementById('comment-author-info').innerText = post.requester?.name || 'مشتري غير معروف';
            commentText.value = '';
            commentStatusMsg.innerText = '';
            commentStatusMsg.className = 'status-msg';
            
            commentModal.classList.add('active');
            document.body.style.overflow = 'hidden';
            commentText.focus();
        }

        async function postComment() {
            const content = commentText.value.trim();
            const token = elements.khamsatToken.value.trim();

            if (!content) {
                showCommentStatus('يرجى كتابة تعليق.', 'error');
                return;
            }
            if (!token) {
                showCommentStatus('يرجى إضافة توكين خمسات في القائمة الجانبية.', 'error');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> جار الإرسال...';
            
            try {
                const res = await fetch(`${API_BASE}/comment`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        id: currentPostId,
                        content: content,
                        token: token
                    })
                });

                const data = await res.json();
                if (data.ok) {
                    showCommentStatus('تم إرسال التعليق بنجاح!', 'success');
                    setTimeout(closeCommentModal, 2000);
                } else {
                    showCommentStatus(`خطأ: ${data.error || 'فشل الإرسال'}`, 'error');
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = '<i class="fa-solid fa-paper-plane"></i> إرسال التعليق';
                }
            } catch (err) {
                showCommentStatus(`خطأ في الاتصال بالسيرفر.`, 'error');
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fa-solid fa-paper-plane"></i> إرسال التعليق';
            }
        }

        function showCommentStatus(msg, type) {
            commentStatusMsg.innerText = msg;
            commentStatusMsg.className = `status-msg ${type}`;
        }

        function closeCommentModal() {
            commentModal.classList.remove('active');
            document.body.style.overflow = '';
            submitBtn.disabled = false;
            submitBtn.innerHTML = '<i class="fa-solid fa-paper-plane"></i> إرسال التعليق';
        }

        document.getElementById('comment-close').addEventListener('click', closeCommentModal);
        submitBtn.addEventListener('click', postComment);

        // Restore Modal Close Listeners
        modalClose.addEventListener('click', closeModal);
        modal.addEventListener('click', (e) => {
            if (e.target === modal) closeModal();
        });
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeModal();
                closeCommentModal();
            }
        });

        // Initialize
        fetchStatus();
        fetchPage(1);

        // Polling interval for status
        setInterval(fetchStatus, 5000);
    </script>
</body>

</html>
